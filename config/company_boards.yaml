# Curated list of company slugs for direct-employer scraping.
# Greenhouse: https://boards-api.greenhouse.io/v1/boards/{slug}/jobs
# Lever:      https://api.lever.co/v0/postings/{slug}?mode=json
# Ashby:      https://api.ashbyhq.com/posting-api/job-board/{slug}
# Workable:   https://apply.workable.com/api/v1/widget/accounts/{slug}
#
# If a slug is missing or has been retired, the scraper logs and moves on.
# Add new slugs by appending to any list and re-running the scraper.

greenhouse:
  - smartsheet
  - lattice
  - pendo
  - pagerduty
  - mercury
  - brex
  - modernhealth
  - oscar
  - flexport
  - chime
