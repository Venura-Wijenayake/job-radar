# Ashby slug list re-curated 2026-05-04 (Phase 4.8c). Validation script
# probed 58 candidate slugs against the public board API; only those
# returning a non-empty jobs list survived. Notable casualties: anthropic,
# huggingface, characterai, replicate — all now 404 against the Ashby
# posting API (they migrated to other ATS or pulled public boards).
ashby:
  # AI labs & ML platforms — confirmed active
  - openai
  - perplexity
  - cohere
  - mistral
  - modal
  - braintrust
  - harvey
  - sierra
  - decagon
  - articul8
  # Modern dev tooling & infra
  - linear
  - posthog
  - browserbase
  - supabase
  - replit
  # Mid-stage startups
  - suno
  - notion
  - mercor
  - pika
  # Phase 4.8c additions — vector DBs, ML infra, dev tooling
  - weaviate
  - pinecone
  - langchain
  - llamaindex
  - baseten
  - neon
  - vellum
  - anyscale
  - contextual
  - prefect

# Workable slug list re-curated 2026-05-04 (Phase 4.8c). The widget
# endpoint was probed for 64 candidate slugs (current + Phase 4.8c
# suggestions); only ``workmotion`` returned a non-empty jobs list.
# Most "famous" Workable customer names (datadog, deel, ramp, miro,
# gusto, plaid, mercury) return HTTP 200 with empty jobs arrays —
# they appear to have migrated to other ATS providers but kept stub
# Workable accounts. Hard-404 slugs (airtm, getlatka, pleo, holded,
# moss, mambu, aiven, etc.) were dropped.
workable:
  - workmotion
